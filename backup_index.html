  <style>

    @keyframes fade-in-up { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fade-in    { from { opacity:0; } to { opacity:1; } }
    @keyframes slide-in-left  { from { opacity:0; transform:translateX(-100px); } to { opacity:1; transform:translateX(0); } }
    @keyframes slide-in-right { from { opacity:0; transform:translateX(100px);  } to { opacity:1; transform:translateX(0); } }
    @keyframes slide-down  { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes scale-in    { from { opacity:0; transform:scale(0.8); }        to { opacity:1; transform:scale(1); } }
    @keyframes float       { 0%,100% { transform:translateY(0) rotate(0deg); } 50% { transform:translateY(-20px) rotate(5deg); } }
    @keyframes float-delayed { 0%,100% { transform:translateY(0) rotate(0deg); } 50% { transform:translateY(-30px) rotate(-5deg); } }
    @keyframes float-spin  { 0%,100% { transform:translateY(0) rotate(0deg); } 50% { transform:translateY(-25px) rotate(180deg); } }
    @keyframes gradient    { 0% { background-position:0% 50%; } 50% { background-position:100% 50%; } 100% { background-position:0% 50%; } }
    @keyframes gradient-text { 0% { background-position:0% 50%; } 50% { background-position:100% 50%; } 100% { background-position:0% 50%; } }
    @keyframes pulse-glow  { 0%,100% { box-shadow:0 0 20px rgba(6,182,212,.5); } 50% { box-shadow:0 0 40px rgba(168,85,247,.8),0 0 60px rgba(236,72,153,.6); } }
    @keyframes blink       { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }
    @keyframes bounce-slow { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }
    @keyframes particle-float { 0% { transform:translateY(0) translateX(0); opacity:0; } 10% { opacity:1; } 90% { opacity:1; } 100% { transform:translateY(-100vh) translateX(50px); opacity:0; } }
    @keyframes ripple      { 0% { transform:scale(0); opacity:1; } 100% { transform:scale(4); opacity:0; } }
    @keyframes shine       { 0% { left:-100%; } 100% { left:100%; } }
    @keyframes spin        { to { transform:rotate(360deg); } }

    .animate-fade-in-up   { animation:fade-in-up .8s ease-out forwards; }
    .animate-fade-in      { animation:fade-in 1s ease-out forwards; }
    .animate-slide-in-left  { animation:slide-in-left .8s ease-out forwards; }
    .animate-slide-in-right { animation:slide-in-right .8s ease-out forwards; }
    .animate-slide-down   { animation:slide-down .4s ease-out forwards; }
    .animate-scale-in     { animation:scale-in .6s ease-out forwards; }
    .animate-float        { animation:float 6s ease-in-out infinite; }
    .animate-float-delayed{ animation:float-delayed 8s ease-in-out infinite; }
    .animate-float-spin   { animation:float-spin 10s ease-in-out infinite; }
    .animate-gradient     { background-size:200% 200%; animation:gradient 15s ease infinite; }
    .animate-gradient-text{ background-size:200% 200%; animation:gradient-text 3s ease infinite; }
    .animate-pulse-glow   { animation:pulse-glow 2s ease-in-out infinite; }
    .animate-blink        { animation:blink 1s step-start infinite; }
    .animate-bounce-slow  { animation:bounce-slow 2s ease-in-out infinite; }
    .animate-spin         { animation:spin 1s linear infinite; }

    .particle { background:linear-gradient(to bottom,#06b6d4,#8b5cf6,#ec4899); animation:particle-float linear infinite; }

    .ripple-button { position:relative; overflow:hidden; }
    .ripple-button::before { content:''; position:absolute; top:50%; left:50%; width:0; height:0; border-radius:50%; background:rgba(255,255,255,.3); transform:translate(-50%,-50%); transition:width .6s,height .6s; }
    .ripple-button:active::before { width:300px; height:300px; }

    html { scroll-behavior:smooth; }
    ::-webkit-scrollbar { width:12px; }
    ::-webkit-scrollbar-track { background:#0a0a0f; }
    ::-webkit-scrollbar-thumb { background:linear-gradient(to bottom,#06b6d4,#8b5cf6,#ec4899); border-radius:6px; }
    ::-webkit-scrollbar-thumb:hover { background:linear-gradient(to bottom,#0891b2,#7c3aed,#db2777); }

    .line-clamp-3 { display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
    .bg-grid-pattern { background-image:linear-gradient(to right,rgba(6,182,212,.1) 1px,transparent 1px),linear-gradient(to bottom,rgba(168,85,247,.1) 1px,transparent 1px); background-size:50px 50px; }
    .bg-gradient-radial { background:radial-gradient(circle,var(--tw-gradient-stops)); }
    .gradient-text { background:linear-gradient(to right,#06b6d4,#8b5cf6,#ec4899); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    h1,h2,h3,h4,h5,h6 { letter-spacing:-.02em; }

    @supports (backdrop-filter:blur(10px)) { .backdrop-blur-md { backdrop-filter:blur(12px); } .backdrop-blur-xl { backdrop-filter:blur(20px); } }

    const Github = ({ size=24, className='' }) => <SvgWrap size={size} className={className}><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></SvgWrap>;
    const Linkedin = ({ size=24, className='' }) => <SvgWrap size={size} className={className}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></SvgWrap>;
    const ExternalLink = ({ size=24, className='' }) => <SvgWrap size={size} className={className}><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></SvgWrap>;

    const ChevronLeft = ({ size=24, className='' }) => <SvgWrap size={size} className={className}><path d="m15 18-6-6 6-6"/></SvgWrap>;
    const ChevronRight = ({ size=24, className='' }) => <SvgWrap size={size} className={className}><path d="m9 18 6-6-6-6"/></SvgWrap>;
    const Sparkles = ({ size=24, className='' }) => <SvgWrap size={size} className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></SvgWrap>;
    const Award = ({ size=24, className='' }) => <SvgWrap size={size} className={className}><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></SvgWrap>;
    const Zap = ({ size=24, className='' }) => <SvgWrap size={size} className={className}><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></SvgWrap>;
    const Code = ({ size=24, className='' }) => <SvgWrap size={size} className={className}><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></SvgWrap>;
    const Palette = ({ size=24, className='' }) => <SvgWrap size={size} className={className}><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></SvgWrap>;
    const Layers = ({ size=24, className='' }) => <SvgWrap size={size} className={className}><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/></SvgWrap>;
    const Star = ({ size=24, className='', fill='none' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor"
        strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
    );

    /* ===== Color lookup maps ===== */
    const COLOR_TEXT = {
      cyan:'#22d3ee', purple:'#c084fc', pink:'#f472b6', blue:'#60a5fa',
      green:'#4ade80', orange:'#fb923c', indigo:'#818cf8', rose:'#fb7185'
    };

    /* ===== App ===== */
    function App() {
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [activeSection, setActiveSection] = useState('home');
      const [activeTab, setActiveTab] = useState('all');
      const [currentTestimonial, setCurrentTestimonial] = useState(0);
      const [stats, setStats] = useState({ clients:0, projects:0, experience:0 });
      const [mousePosition, setMousePosition] = useState({ x:0, y:0 });
      const [isTyping, setIsTyping] = useState(true);
      const [typedText, setTypedText] = useState('');
      const [scrollY, setScrollY] = useState(0);
      const [visibleSections, setVisibleSections] = useState({});

      const fullText = "Professional Designer";

      useEffect(() => {
        if (isTyping && typedText.length < fullText.length) {
          const t = setTimeout(() => setTypedText(fullText.slice(0, typedText.length + 1)), 100);
          return () => clearTimeout(t);
        } else if (typedText.length === fullText.length) {
          setIsTyping(false);
        }
      }, [typedText, isTyping]);

      useEffect(() => {
        const h = () => setScrollY(window.scrollY);
        window.addEventListener('scroll', h);
        return () => window.removeEventListener('scroll', h);
      }, []);

      useEffect(() => {
        const observer = new IntersectionObserver(
          (entries) => entries.forEach((e) => {
            if (e.isIntersecting) setVisibleSections(prev => ({ ...prev, [e.target.id]: true }));
          }),
          { threshold: 0.1 }
        );
        const sections = document.querySelectorAll('section[id]');
        sections.forEach(s => observer.observe(s));
        return () => sections.forEach(s => observer.unobserve(s));
      }, []);

      useEffect(() => {
        const h = (e) => setMousePosition({ x: e.clientX, y: e.clientY });
        window.addEventListener('mousemove', h);
        return () => window.removeEventListener('mousemove', h);
      }, []);

      useEffect(() => {
        const target = { clients:29, projects:101, experience:3 };
        const steps = 60;
        const inc = { clients:target.clients/steps, projects:target.projects/steps, experience:target.experience/steps };
        let step = 0;
        const timer = setInterval(() => {
          step++;
          setStats({
            clients:   Math.min(Math.floor(inc.clients   * step), target.clients),
            projects:  Math.min(Math.floor(inc.projects  * step), target.projects),
            experience:Math.min(Math.floor(inc.experience* step), target.experience),
          });
          if (step >= steps) clearInterval(timer);
        }, 2000 / steps);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        const h = () => {
          const ids = ['home','about','services','portfolio','contact'];
          const pos = window.scrollY + 100;
          for (const id of ids) {
            const el = document.getElementById(id);
            if (el) {
              const { offsetTop, offsetHeight } = el;
              if (pos >= offsetTop && pos < offsetTop + offsetHeight) { setActiveSection(id); break; }
            }
          }
        };
        window.addEventListener('scroll', h);
        return () => window.removeEventListener('scroll', h);
      }, []);

      const scrollToSection = (id) => {
        const el = document.getElementById(id);
        if (el) { el.scrollIntoView({ behavior:'smooth' }); setIsMenuOpen(false); }
      };

      const handleContactSubmit = (e) => {
        e.preventDefault();
        const d = new FormData(e.target);
        const name = d.get('fullname') || '';
        const email = d.get('email') || '';
        const msg = d.get('message') || '';
        window.location.href = `mailto:vidhit305patel@gmail.com?subject=${encodeURIComponent('Portfolio Contact – ' + name)}&body=${encodeURIComponent('From: ' + name + '\nEmail: ' + email + '\n\n' + msg)}`;
      };

      const parallaxOffset = scrollY * 0.5;

      const services = [
        { number:'01', title:'UI DESIGN',            description:'Design systems & component libraries, Auto-layout, variants, and responsive layouts, User flows & wireframes.',                                                        icon:<Palette className="w-8 h-8"/>, gradient:'from-cyan-500 to-blue-500'    },
        { number:'02', title:'LOGO DESIGN',           description:'Logo concepts & visual storytelling, Typography & color psychology, Brand guidelines & usage rules, Icons, patterns and assets.',                                    icon:<Sparkles className="w-8 h-8"/>, gradient:'from-purple-500 to-pink-500' },
        { number:'03', title:'MOTION GRAPHICS',       description:'Logo animations & brand motion, UI animations & micro-interactions, Lottie JSON optimisation, Smooth transitions & easing.',                                        icon:<Zap className="w-8 h-8"/>,      gradient:'from-orange-500 to-red-500'   },
        { number:'04', title:'2D & BASIC 3D VISUALS', description:'Product illustrations & UI visuals, Basic 3D modeling & rendering, Iconography & visual assets, App-ready Icons.',                                                  icon:<Layers className="w-8 h-8"/>,   gradient:'from-green-500 to-emerald-500'},
        { number:'05', title:'ICON DESIGN',           description:'Grid-based and pixel-perfect icon design, Consistent stroke, size, and spacing systems, Web & app-optimized formats (SVG, PNG).',                                   icon:<Award className="w-8 h-8"/>,    gradient:'from-yellow-500 to-orange-500'},
        { number:'06', title:'GRAPHIC DESIGN',        description:'Strong visual hierarchy & composition, Typography, color theory & layout design, Digital-first and print-ready designs, Clean, modern, and scalable graphics.',     icon:<Code className="w-8 h-8"/>,     gradient:'from-indigo-500 to-purple-500'},
      ];

      const skills = [
        { name:'Icons Designing',           rating:5.0, description:'Clean, responsive, and optimized graphics designed specifically for web and mobile applications, ensuring performance, consistency, and seamless developer handoff.', color:'cyan'   },

          <section className={`py-20 relative transition-all duration-1000 ${visibleSections['portfolio'] ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-20'}`}>
            <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
              <div className="text-center mb-12">
                <h2 className="text-4xl md:text-5xl lg:text-6xl font-bold mb-4 animate-scale-in">
                  <span className="bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">What Clients Say</span>
                </h2>
              </div>
              <div className="relative bg-gradient-to-br from-white/5 to-transparent rounded-3xl p-8 md:p-12 border border-white/10 overflow-hidden animate-fade-in">
                <div className="absolute inset-0 bg-gradient-to-br from-purple-500/5 to-pink-500/5 animate-gradient"></div>
                <div className="text-center relative z-10">
                  <div className="relative inline-block mb-6">
                    <div className="absolute -inset-1 bg-gradient-to-r from-cyan-500 to-purple-500 rounded-full blur-lg opacity-50 animate-pulse-glow"></div>
                    <img src={testimonials[currentTestimonial].image} alt={testimonials[currentTestimonial].name}
                      className="relative w-24 h-24 rounded-full object-cover border-4 border-white/20 animate-scale-in"/>
                  </div>
                  <p className="text-xl md:text-2xl text-gray-300 mb-6 italic leading-relaxed">"{testimonials[currentTestimonial].text}"</p>
                  <h4 className="text-xl font-bold mb-1 bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">{testimonials[currentTestimonial].name}</h4>
                  <p className="text-gray-400">{testimonials[currentTestimonial].role}</p>
                </div>
                <button onClick={prevTestimonial}
                  className="absolute left-4 top-1/2 -translate-y-1/2 bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-600 hover:to-blue-600 p-3 rounded-full transition-all hover:scale-125 shadow-lg animate-pulse-glow">
                  <ChevronLeft size={24}/>
                </button>
                <button onClick={nextTestimonial}
                  className="absolute right-4 top-1/2 -translate-y-1/2 bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 p-3 rounded-full transition-all hover:scale-125 shadow-lg animate-pulse-glow">
                  <ChevronRight size={24}/>
                </button>
                <div className="flex justify-center gap-2 mt-8">
                  {testimonials.map((_, i) => (
                    <button key={i} onClick={() => setCurrentTestimonial(i)}
                      className={`h-2 rounded-full transition-all duration-300 ${currentTestimonial===i ? 'bg-gradient-to-r from-cyan-400 to-purple-500 w-8 animate-pulse-glow' : 'bg-gray-600 w-2 hover:bg-gray-500'}`}/>
                  ))}
                </div>
              </div>
            </div>
          </section>

          {/* Contact */}
          <section id="contact" className={`py-20 relative transition-all duration-1000 ${visibleSections['contact'] ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-20'}`}>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
              <div className="text-center mb-12">
                <p className="text-cyan-400 uppercase tracking-wider text-sm mb-2 font-semibold">Contact Info</p>
                <h2 className="text-4xl md:text-5xl lg:text-6xl font-bold mb-4 animate-scale-in">
                  <span className="bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">Get in Touch</span>
                </h2>
              </div>
              <div className="grid md:grid-cols-2 gap-12">
                <div className="animate-slide-in-left">
                  <h3 className="text-2xl font-bold mb-8 bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">Contact Information</h3>
                  <div className="space-y-6">
                    {[
                      { icon:<Phone className="text-cyan-400" size={24}/>,   label:'Call Me',   value:'+91 7567400750',            href:'tel:+917567400750',                       gradient:'from-cyan-500 to-blue-500'    },
                      { icon:<Mail className="text-purple-400" size={24}/>,  label:'Email Me',  value:'vidhit305patel@gmail.com',   href:'mailto:vidhit305patel@gmail.com',         gradient:'from-purple-500 to-pink-500' },
                      { icon:<MapPin className="text-pink-400" size={24}/>,  label:'Location',  value:'Surat, Gujarat',             href:null,                                      gradient:'from-pink-500 to-rose-500'   },
                    ].map((item, idx) => (
                      <div key={idx} className="flex items-start gap-4 group animate-fade-in-up" style={{ animationDelay:`${idx*.1}s` }}>
                        <div className={`bg-gradient-to-br ${item.gradient} p-3 rounded-xl group-hover:scale-125 group-hover:rotate-12 transition-all duration-300 shadow-lg animate-pulse-glow`}>
                          {item.icon}
                        </div>
                        <div>
                          <p className="text-gray-400 text-sm mb-1">{item.label}</p>
                          {item.href
                            ? <a href={item.href} className="text-lg font-semibold hover:text-cyan-400 transition-all">{item.value}</a>
                            : <p className="text-lg font-semibold">{item.value}</p>
                          }
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="animate-slide-in-right">
                  <h3 className="text-2xl font-bold mb-8 bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">Write Me Something</h3>
                  <form className="space-y-6" onSubmit={handleContactSubmit}>
                    <div className="animate-fade-in-up" style={{ animationDelay:'.1s' }}>
                      <input type="text" name="fullname" placeholder="Your Name"
                        className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/50 transition-all hover:border-cyan-500/50 text-white"/>
                    </div>
                    <div className="animate-fade-in-up" style={{ animationDelay:'.2s' }}>
                      <input type="email" name="email" placeholder="Your Email"
                        className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-500/50 transition-all hover:border-purple-500/50 text-white"/>
                    </div>
                    <div className="animate-fade-in-up" style={{ animationDelay:'.3s' }}>
                      <textarea name="message" placeholder="Your Message" rows="5"
                        className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-pink-500 focus:ring-2 focus:ring-pink-500/50 transition-all resize-none hover:border-pink-500/50 text-white"></textarea>
                    </div>
                    <button type="submit"
                      className="w-full bg-gradient-to-r from-cyan-500 via-purple-600 to-pink-600 py-4 rounded-xl font-semibold hover:shadow-2xl hover:shadow-purple-500/50 transition-all duration-300 transform hover:scale-105 relative overflow-hidden group ripple-button animate-fade-in-up"
                      style={{ animationDelay:'.4s' }}>
                      <span className="relative z-10">Send Message</span>
                      <div className="absolute inset-0 bg-gradient-to-r from-pink-600 via-purple-600 to-cyan-500 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    </button>
                  </form>
                </div>
              </div>
            </div>
          </section>

          {/* Footer */}
          <footer className="bg-white/5 border-t border-white/10 py-8 relative">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
              <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                <p className="text-gray-400 text-sm">Copyright 2025 All Rights Reserved</p>
                <div className="flex gap-6">
                  {[
                    { href:'https://github.com',   icon:<Github size={20}/>,       color:'hover:text-cyan-400'   },
                    { href:'https://linkedin.com',  icon:<Linkedin size={20}/>,     color:'hover:text-purple-400' },
                    { href:'https://behance.net',   icon:<ExternalLink size={20}/>, color:'hover:text-pink-400'   },
                  ].map((s, i) => (
                    <a key={i} href={s.href} target="_blank" rel="noopener noreferrer"
                      className={`text-gray-400 ${s.color} transition-all duration-300 hover:scale-125 hover:rotate-12`}>
                      {s.icon}
                    </a>
                  ))}
                </div>
              </div>
            </div>
          </footer>

          {/* Scroll to top */}
          {scrollY > 500 && (
            <button onClick={() => window.scrollTo({ top:0, behavior:'smooth' })}
              className="fixed bottom-8 right-8 z-50 bg-gradient-to-r from-cyan-500 to-purple-600 p-4 rounded-full shadow-2xl hover:shadow-purple-500/50 transition-all duration-300 transform hover:scale-110 animate-bounce-slow">
              <ChevronLeft className="rotate-90" size={24}/>
            </button>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
